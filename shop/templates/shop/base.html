{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>
      {% block title %}
        My Shop
      {% endblock %}
    </title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <script>
      window.csrfToken = '{{ csrf_token }}'
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="logo" href="{% url 'shop:index' %}">MyShop</a>
        <nav>
          <a href="{% url 'shop:cart' %}">Cart</a>
          {% if request.user.is_authenticated %}
            <span>Hi, {{ request.user.username }}</span>
            <a href="{% url 'shop:logout' %}">Logout</a>
          {% else %}
            <a href="{% url 'shop:login' %}">Login</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container">
      {% block content %}

      {% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ now|date:'Y' }} MyShop — simple example</p>
      </div>
    </footer>

    <script src="{% static 'js/cart.js' %}"></script>
  </body>
</html>
